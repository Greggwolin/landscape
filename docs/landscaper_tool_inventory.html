<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Landscaper Tool Inventory</title>

<style>
  :root {
    --bg: #1A1E28;
    --bg-elev: #232836;
    --bg-row: #1f2430;
    --bg-row-alt: #242a38;
    --border: #2e3546;
    --text: #d9dde6;
    --text-dim: #8a93a8;
    --accent: #4a7fb8;
    --read: #4a9c6b;
    --write: #b8724a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  header {
    padding: 16px 24px; background: var(--bg-elev); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0 0 4px 0; font-size: 18px; font-weight: 600; }
  header .sub { color: var(--text-dim); font-size: 12px; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; align-items: center;
  }
  .controls input, .controls select, .controls button {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px; font: inherit;
  }
  .controls input[type=search] { min-width: 260px; flex: 1; }
  .controls label { color: var(--text-dim); font-size: 12px; margin-right: 4px; }
  .controls .stats { margin-left: auto; color: var(--text-dim); font-size: 12px; }
  .controls .stats b { color: var(--text); }
  main { padding: 0; }
  table {
    width: 100%; border-collapse: collapse; font-size: 12.5px;
    table-layout: fixed;
  }
  thead th {
    background: var(--bg-elev); color: var(--text); font-weight: 600;
    text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; cursor: pointer; user-select: none;
    white-space: normal;
  }
  thead th:hover { background: #2a303f; }
  thead th.sorted::after { content: ' \25BE'; color: var(--accent); }
  thead th.sorted.asc::after { content: ' \25B4'; }
  tbody td {
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    vertical-align: top; word-wrap: break-word;
  }
  tbody tr:nth-child(even) { background: var(--bg-row-alt); }
  tbody tr:nth-child(odd)  { background: var(--bg-row); }
  tbody tr.hide { display: none; }
  .name { font-family: SF Mono, Consolas, monospace; color: #c8e0ff; font-size: 12px; }
  .badge {
    display: inline-block; padding: 1px 7px; border-radius: 3px;
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.3px;
    color: #fff; text-transform: uppercase;
  }
  .rw-r { background: var(--read); }
  .rw-w { background: var(--write); }
  .g-universal { background: #4a7fb8; }
  .g-landdev { background: #6b9c4f; }
  .g-multifamily { background: #b8724a; }
  .g-incomeproperty { background: #8a5cb8; }
  .g-cre { background: #a84a7f; }
  .g-ingestion { background: #4ab8a8; }
  .g-whatifscenario { background: #b8a44a; }
  .g-admin { background: #8a8a8a; }
  col.c-num { width: 42px; }
  col.c-name { width: 18%; }
  col.c-trig { width: 22%; }
  col.c-desc { width: auto; }
  col.c-rw   { width: 50px; }
  col.c-group { width: 130px; }
  tbody td.num { color: var(--text-dim); text-align: right; }
  footer {
    padding: 12px 24px; color: var(--text-dim); font-size: 11.5px;
    border-top: 1px solid var(--border); background: var(--bg-elev);
  }
  @media (max-width: 900px) {
    col.c-trig { width: 25%; }
    col.c-name { width: 20%; }
  }
</style>
</head>

</header>
<main>

</main>

evels (Area/Phase/Parcel) are enabled and their labels.", "group": "Land Dev", "rw": "R", "trigger": "Land dev projects only \u2014 Land Planning", "proptypes": ["land"]}, {"name": "stage_parcel_lots", "desc": "Stage parsed lot data into the Ingestion Workbench for user review before committing to the database.", "group": "Land Dev", "rw": "W", "trigger": "Land dev projects only \u2014 Land Planning", "proptypes": ["land"]}, {"name": "bulk_create_parcels", "desc": "Bulk-create parcels and optionally phases from structured lot data.", "group": "Land Dev", "rw": "W", "trigger": "Land dev projects only \u2014 Land Planning", "proptypes": ["land"]}, {"name": "open_input_modal", "desc": "Open a structured editing interface (modal) for the user.", "group": "Universal", "rw": "R", "trigger": "Any project, any page (+ pre-project)", "proptypes": ["land", "mf", "cre"]}, {"name": "classify_excel_file", "desc": "Classify an uploaded Excel workbook (.xlsx/.xlsm) into one of three audit tiers: 'flat' (tabular data, no formulas worth auditing), 'assumption_heavy' (labeled inputs across sheets, limited model logic), or 'full_model' (waterfall/debt/cash flow with interdependent formulas).", "group": "Universal", "rw": "R", "trigger": "Any project, any page (+ pre-project)", "proptypes": ["land", "mf", "cre"]}, {"name": "run_structural_scan", "desc": "Phase 1 of the Excel audit. Returns sheet inventory (names, dimensions, hidden flag), named ranges, and any external workbook links. External links are a portability red flag. Run after classify_excel_file on assumpti\u2026", "group": "Universal", "rw": "R", "trigger": "Any project, any page (+ pre-project)", "proptypes": ["land", "mf", "cre"]}, {"name": "run_formula_integrity", "desc": "Phase 2 of the Excel audit. Runs four integrity checks and returns a findings list with Sheet!Cell references: (2a) error cells like #REF!/#DIV/0!, (2b) broken references inside formulas, (2c) hardcoded numeric overri\u2026", "group": "Universal", "rw": "R", "trigger": "Any project, any page (+ pre-project)", "proptypes": ["land", "mf", "cre"]}, {"name": "extract_assumptions", "desc": "Phase 3 of the Excel audit. Scans the workbook for labeled input values (label-left-of-value heuristic) and writes them to ai_extraction_staging as pending rows with extraction_type='excel_audit_assumption'. Requires\u2026", "group": "Universal", "rw": "R", "trigger": "Any project, any page (+ pre-project)", "proptypes": ["land", "mf", "cre"]}, {"name": "generate_map_artifact", "desc": "Generate an interactive aerial/satellite map artifact centered on the project location.", "group": "Universal", "rw": "R", "trigger": "Any page \u2014 surfaced on: Map", "proptypes": ["land", "mf", "cre"]}, {"name": "log_alpha_feedback", "desc": "Log user feedback (bug, suggestion, question) from chat.", "group": "Universal", "rw": "W", "trigger": "Any page \u2014 surfaced on: Alpha Assistant (+ pre-project)", "proptypes": ["land", "mf", "cre"]}, {"name": "store_appraisal_valuation", "desc": "Store appraisal valuation conclusions (reconciled value, approach values, appraiser info) as project knowledge facts.", "group": "Universal", "rw": "R", "trigger": "Any project, any page", "proptypes": ["land", "mf", "cre"]}, {"name": "store_market_intelligence", "desc": "Store market intelligence from an appraisal (sales volume, pricing trends, absorption, vacancy) as platform-level knowledge reusable across projects.", "group": "Universal", "rw": "R", "trigger": "Any project, any page", "proptypes": ["land", "mf", "cre"]}, {"name": "store_construction_benchmarks", "desc": "Store construction cost benchmarks from an appraisal (cost per SF, site improvements, profit margins) as platform-level knowledge.", "group": "Universal", "rw": "R", "trigger": "Any project, any page", "proptypes": ["land", "mf", "cre"]}, {"name": "get_appraisal_knowledge", "desc": "Query stored appraisal knowledge \u2014 project-level valuation facts or market-level benchmarks and intelligence.", "group": "Universal", "rw": "R", "trigger": "Any project, any page", "proptypes": ["land", "mf", "cre"]}];
const tbody = document.getElementById('tbody');
const q = document.getElementById('q');
const gf = document.getElementById('gf');
const rwf = document.getElementById('rwf');
const ptf = document.getElementById('ptf');
const reset = document.getElementById('reset');
const stats = document.getElementById('stats');

function esc(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function groupClass(g) { return 'g-' + g.toLowerCase().replace(/[^a-z0-9]/g,''); }

let state = { sort: 'idx', dir: 1 };
let current = ROWS.map((r, i) => ({...r, idx: i + 1}));

function render() {
  const term = q.value.trim().toLowerCase();
  const gv = gf.value, rwv = rwf.value, ptv = ptf.value;
  const filtered = current.filter(r => {
    if (term && !(r.name.toLowerCase().includes(term) || r.desc.toLowerCase().includes(term))) return false;
    if (gv && r.group !== gv) return false;
    if (rwv && r.rw !== rwv) return false;
    if (ptv && !r.proptypes.includes(ptv)) return false;
    return true;
  });
  const sorted = filtered.sort((a,b) => {
    const A = a[state.sort], B = b[state.sort];
    if (A < B) return -1 * state.dir;
    if (A > B) return 1 * state.dir;
    return 0;
  });
  tbody.innerHTML = sorted.map((r, i) => `
    <tr>
      <td class="num">${i + 1}</td>
      <td class="name">${esc(r.name)}</td>
      <td>${esc(r.trigger)}</td>
      <td>${esc(r.desc)}</td>
      <td><span class="badge rw-${r.rw.toLowerCase()}">${r.rw}</span></td>
      <td><span class="badge ${groupClass(r.group)}">${esc(r.group)}</span></td>
    </tr>
  `).join('');
  const reads = sorted.filter(r => r.rw === 'R').length;
  const writes = sorted.filter(r => r.rw === 'W').length;
  stats.innerHTML = `Showing <b>${sorted.length}</b> of ${ROWS.length} · <b>${reads}</b> read / <b>${writes}</b> write`;
}

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (state.sort === k) state.dir = -state.dir;
    else { state.sort = k; state.dir = 1; }
    document.querySelectorAll('th').forEach(x => x.classList.remove('sorted','asc'));
    th.classList.add('sorted');
    if (state.dir === 1) th.classList.add('asc');
    render();
  });
});
[q, gf, rwf, ptf].forEach(el => el.addEventListener('input', render));
reset.addEventListener('click', () => {
  q.value = ''; gf.value = ''; rwf.value = ''; ptf.value = '';
  render();
});
render();
</script>
