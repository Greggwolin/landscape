# GitHub Actions: Preview Environment Workflow
# Version: v1.0 (2025-10-13)
#
# Triggers on PR open/synchronize
# - Creates Neon database branch
# - Runs migrations and seeds
# - Deploys to Vercel preview
# - Runs tests against preview environment

name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - work

env:
  NODE_VERSION: '20'
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

jobs:
  # ==========================================================================
  # JOB 1: Create Neon Branch
  # ==========================================================================
  create-database:
    name: Create Database Branch
    runs-on: ubuntu-latest
    outputs:
      # The secret-bearing connection string is intentionally NOT a job output:
      # GitHub scrubs secret values across job-output boundaries, which delivered
      # an empty DATABASE_URL downstream. Only non-secret branch identifiers
      # cross the boundary; each consumer re-derives the URL in-job via the
      # resolve-neon-db-url composite action.
      branch_id: ${{ steps.create-branch.outputs.NEON_BRANCH_ID }}
      branch_name: ${{ steps.create-branch.outputs.NEON_BRANCH_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Neon CLI
        run: |
          npm install -g neonctl
          neonctl --version

      - name: Create Neon branch
        id: create-branch
        run: |
          chmod +x ./scripts/neon-branch-create.sh
          ./scripts/neon-branch-create.sh ${{ github.event.pull_request.number }}

  # ==========================================================================
  # JOB 2: Run Migrations
  # ==========================================================================
  migrate-database:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: create-database

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Resolve DATABASE_URL
        uses: ./.github/actions/resolve-neon-db-url
        with:
          branch-name: ${{ needs.create-database.outputs.branch_name }}
          neon-api-key: ${{ secrets.NEON_API_KEY }}
          neon-project-id: ${{ secrets.NEON_PROJECT_ID }}

      - name: Run migrations
        run: |
          chmod +x ./scripts/run-migrations.sh
          ./scripts/run-migrations.sh ${{ needs.create-database.outputs.branch_name }}

      - name: Run smoke tests
        run: |
          psql "$DATABASE_URL" -f ./tests/data_layer_smoke_test.sql

  # ==========================================================================
  # JOB 3: Build and Test
  # ==========================================================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    # Hermetic: lint, typecheck, build, and jest unit tests need no live DB
    # (the build only needs JWT_SIGNING_KEY present — see the Build step). This
    # job intentionally has NO `needs:` on create-database/migrate-database so a
    # Neon control-plane hiccup can't skip the entire frontend gate, mirroring
    # the backend-tests job. DB-backed verification lives in migrate-database.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        # Re-enabled after the #43 backlog burndown (was ~1,040 pre-existing errors).
        # tsc --noEmit must pass; two known-deferred items carry tracked TODO(#43) suppressions.
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # next build evaluates route modules during page-data collection;
          # src/lib/auth.ts throws at import if JWT_SIGNING_KEY is unset. The
          # build only needs the var present (it's a runtime signing key, not
          # used at build time), so a placeholder is sufficient here.
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY || 'ci-build-time-placeholder' }}
          # Likewise, src/lib/db.ts calls neon() at import, which throws if
          # DATABASE_URL is unset — page-data collection hits API routes (e.g.
          # /api/absorption) that import it. The dynamic routes aren't executed
          # at build time, so a syntactically-valid placeholder keeps this job
          # hermetic (no live Neon branch needed for lint/typecheck/build/unit).
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://user:pass@localhost:5432/land_v2' }}

      - name: Run unit tests
        # Jest unit tests only. The Playwright contrast e2e (test:contrast / the
        # full `npm test`) needs the deployed preview, so it runs in the
        # post-deploy api-tests job, not here.
        run: npm run test:tokens

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests

  # ==========================================================================
  # JOB 4: Backend Tests (Django / pytest)
  # ==========================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: landscape
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Hermetic: the backend test DB is built from current model state against
      # this throwaway Postgres service (see backend/conftest.py — it creates the
      # `landscape` schema and the unmanaged tables). No Neon branch or production
      # data is involved, so this job needs neither NEON_* secrets nor the
      # create-database/migrate jobs.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/landscape
      SECRET_KEY: ci-test-secret-key-not-used-in-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend test suite
        working-directory: backend
        # Quarantined-but-tracked tests are skipped (see TODO(LSCMD-CLEANUP-BACKENDTESTS-0609));
        # the rest must stay green. This gates the backend suite going forward,
        # mirroring the #43 typecheck gate.
        run: pytest

  # NOTE: the former "Deploy to Vercel" (amondnet/vercel-action) and
  # "API Contract Tests" jobs were removed — the deploy job had no VERCEL_TOKEN
  # secret (it never ran; Vercel's native GitHub integration handles preview
  # deploys and is green) and api-tests had no test:api script and depended on
  # that dead deploy. Re-add a real deploy/API gate only with a configured
  # VERCEL_TOKEN + a real test:api. Tracked alongside #43/#39.
