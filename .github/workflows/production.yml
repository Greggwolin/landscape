# GitHub Actions: Production Deployment
# Version: v2.0 (2026-07-09 — KP-CIFIX-0709)
#
# Triggers on push to main branch.
#
# Scope: CI validation + production health check ONLY. Production is deployed by
# Vercel's native Git integration (main → production), which is the single
# authoritative deploy path — this workflow intentionally does NOT deploy, to
# avoid a second competing production deploy.
#
# History: the previous v1 also snapshotted Neon, ran prod migrations, and did a
# second `vercel --prod` deploy. Those jobs were removed (KP-CIFIX-0709) because
# (a) Vercel native already deploys, (b) Railway runs Django migrations on its
# own deploy, and (c) the whole workflow had been red at Run Tests (missing
# JWT_SIGNING_KEY) so those jobs had never actually run.

name: Production Deployment

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================================================
  # JOB 1: Tests (hermetic — lint, typecheck, build, unit tokens)
  # ==========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: |
          npm run lint
          npm run typecheck

      - name: Build
        run: npm run build
        env:
          # next build evaluates route modules during page-data collection;
          # src/lib/auth.ts throws at import if JWT_SIGNING_KEY is unset, and
          # src/lib/db.ts calls neon() at import (throws if DATABASE_URL is
          # unset). Both are runtime values not used at build time, so a
          # placeholder is sufficient here — mirrors preview.yml's build job.
          # NEVER put the real signing key in this file; it's a GitHub secret.
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY || 'ci-build-time-placeholder' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://user:pass@localhost:5432/land_v2' }}

      - name: Run unit tests
        # Hermetic Jest unit tests (theme tokens). The Playwright contrast e2e
        # (`test:contrast`) needs a live deployed URL, so — as in preview.yml —
        # it is NOT run in this hermetic job.
        run: npm run test:tokens

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: production

  # ==========================================================================
  # JOB 2: Production Health Check
  # ==========================================================================
  # Verifies production (deployed by Vercel native) is serving. Runs after tests.
  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check production is serving
        run: |
          # Canonical Vercel production domain. `/login` is an unauthenticated
          # page that returns 200 when the frontend is healthy (there is no
          # dedicated /api/health route). Update PROD_URL here if a custom
          # domain is added later.
          PROD_URL="https://landscape-hazel.vercel.app/login"
          echo "Checking production health: $PROD_URL"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$PROD_URL" || echo "000")

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Health check passed (HTTP $RESPONSE)"
          else
            echo "❌ Health check failed (HTTP $RESPONSE)"
            exit 1
          fi
